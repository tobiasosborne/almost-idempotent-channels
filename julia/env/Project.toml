# Julia environment for bead aic-d24: the diamond-norm SDP golden master.
# This is a plain ENVIRONMENT (no name/uuid -> no phantom package to precompile),
# instantiated/resolved into julia/env/Manifest.toml (committed, so the fixture
# values are reproducible). Convex 0.16 + MosekTools (Mosek 11) handle the complex
# Watrous SDP natively. NO PYTHON (user directive). Regenerate fixtures with:
#   julia --project=julia/env tools/gen_fixtures_d24.jl
[deps]
Convex = "f65535da-76fb-5f13-bab9-19810c17039a"
LinearAlgebra = "37e2e46d-f89d-539d-b4ee-838fcccc9c8e"
Mosek = "6405355b-0ac2-5fba-af84-adbd65488c0e"
MosekTools = "1ec41992-ff65-5c91-ac43-2df89e9693a4"
Printf = "de0858da-6303-5e67-8744-51eddeeeb8d7"

[compat]
Convex = "0.16"
Mosek = "11"
MosekTools = "0.15, 0.16"
julia = "1.10"
